<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">

  <title>Oasis Forever</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

  <div class="header">
    <div class="container">
      <div class="logo">
        <img src="./assets/img/oasis_logo.png" alt="Logo Oasis" class="logo-img">

      </div>

      <ul class="navbar">
        <li><a href="#">Home</a></li>
